trigger:
- main

pool:
  name: Default

variables:
- name: stageName
  value: Build

stages:
- stage: Build
  displayName: 'Build Stage'
  jobs:
  - job: BuildJob
    displayName: 'Build Job'
    steps:
    - script: |
        echo "Current stage: $(stageName)"
      displayName: 'Showing current stage'
    - script: |
        echo "##vso[task.setvariable variable=stageName,isOutput=true]Test"
      name: setStageName
      displayName: 'Updating stageName variable'

- stage: Test
  displayName: 'Test stage'
  dependsOn: Build
  variables:
    stageVersionFromBuild: $[stageDependencies.Build.BuildJob.outputs['setStageName.stageName']]
  jobs:
  - job: testJob
    displayName: 'Test Job'
    steps:
    - script: |
        echo "Showing current stageName value: $(stageName)"
