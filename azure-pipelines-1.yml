trigger:
- main

pool:
 name: Default

variables:
- name: env
  value: dev
- name: version
  value: v1
- name: owner
  value: adanm

stages:
- stage: Build
  displayName: 'Build Stage'
  jobs:
  - job: dispVars
    displayName: 'Showing vars'
    steps:
    - script: |
        echo "Showing all variables"
        echo "Environment: $(env)"
        echo "Version: $(version)"
        echo "Owner: $(owner)"
    - script: |
        echo "##vso[task.setvariable, variable=version]v2"
      name: changingVersion
      displayName: 'Changing to v2'
    - script: |
        echo "##vso[task.setvariable, variable=env]lab"
      name: changingEnv
      displayName: 'Changinv to lab env'
      condition: eq(variables['version'],'v2')
    - script: |
        echo "##vso[task.setvariable variable=owner]root"
      name: changingOwner
      displayName: 'Changing owner to root'
      condition: and(
        succeeded(),
        eq(variables['version'],'v2'),
        eq(variables['env'],'labs'))
    - script: |
        echo "Showing variables after changes and validations"
        echo "Environment: $(env)"
        echo "Version: $(version)"
        echo "Owner: $(owner)"
