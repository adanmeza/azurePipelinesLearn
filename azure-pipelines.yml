
parameters:
- name: environments
  type: object
  default:
    - dev
    - qa
    - prod

trigger:
- main

pool:
  name: Default

stages:
- stage: Deploy
  jobs:
  - ${{ each env in parameters.environments }}:
    - deployment: deploy_${{ env }}
      environment: ${{ env }}
      strategy:
        runOnce:
          deploy:
            steps:
            - script: |
                echo "Deploying to ${{ env }}"