trigger:
- main

pool:
  name: Default

variables:
- name: stageName
  value: 'firstStage'

parameters:
- name: boolVar
  default: true
- name: workZone
  type: object
  default:
    - work1
    - work2
    - work3  

stages:
- stage: ${{ variables.stageName }}
  jobs:
  - ${{ each zone in parameters.workZone }}:
    - ${{ if eq(parameters.boolVar, true) }}:
      - job: job_${{ zone }}
        steps:
        - script: |
            echo "This is ${{ zone }}"