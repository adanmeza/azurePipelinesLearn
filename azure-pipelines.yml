trigger:
  branches:
    include:
      - main

variables:
- name: appName
  value: myApp

stages:
  - stage: Build
    displayName: 'Build Stage'
    jobs:
    - job: BuildJob
      displayName: 'Building app'
      steps:
      - script: echo "Building app $(appName)"
      - script: |
          echo "##vso[task.setvariable variable=version;isOutput=true]v1"
        name: setVersion

  - stage: verCheck
    displayName: 'Version check'
    variables:
      version: $[stageDependencies.Build.BuildJob.outputs['setVersion.version']]
    dependsOn: Build
    condition: and(succeeded(),eq(variables.version,'v1'))
    jobs:
    - job: versionCheckJob
      displayName: 'Showing current version'
      steps:
      - script: |
          echo "The current version is $(version)"
      - script: |
          echo "##vso[task.setvariable variable=newVersion;isOutput=true]v2"
        name: versionUpdate

  - stage: verUpdate
    displayName: 'New version'
    variables:
      newVersion: $[stageDependencies.verCheck.versionCheckJob.outputs['versionUpdate.newVersion']]
    dependsOn: verCheck
    condition: and(succeeded(),eq(variables['Build.SourceBranch'],'refs/heads/main'))
    jobs:
    - job: showingValues
      displayName: 'Showing app name and version'
      steps:
      - script: |
          echo "App name is: $(appName), and version is: $(newVersion)"
