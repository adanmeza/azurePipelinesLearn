parameters:
- name: work1
  type: boolean
  default: true
- name: work2
  type: boolean
  default: false

stages:
  - stage:
    pool:
      name: Default

    jobs:
      - ${{ each parameter in parameters }}:
        - ${{ if and(eq(parameter.value,true),contains(parameter.key,'work')) }}:
          - job: doSomething_${{ parameters.name }}
            steps:
              - bash:
                  set -ex
                  echo "Hello World!"
                name: hello
                displayName: Greet
          - template: templates/doingStuffTemplate.yaml

