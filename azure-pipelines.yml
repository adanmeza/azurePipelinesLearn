trigger:
- main

pool: Default

stages:
- stage: Build
  displayName: 'Build Stage'
  jobs:
  - job: BuildJob
    displayName: 'Build Job'
    steps:
    - script: |
        echo "Hello Build!"
      displayName: 'Waving Build'
    - script: |
        echo "Good bye Build"
      displayName: 'Bye Build'
- stage: Test
  displayName: 'Test Stage'
  jobs:
  - job: TestJob
    displayName: 'Test Job'
    steps:
    - script: |
        echo "This is a test job"
        echo "This is a test job"