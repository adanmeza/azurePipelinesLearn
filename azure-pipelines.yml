trigger:
- main

variables:
  - name: greet
    value: Hello

pool: Default

stages:
- stage: Build
  displayName: 'Build Stage'
  jobs:
  - job: BuildJob
    displayName: 'Build Job'
    steps:
    - script: |
        echo "${{ variables.greet }} - Build!"
      displayName: 'Waving Build'
    - script: |
        echo "Good bye Build"
      displayName: 'Bye Build'
- stage: Test
  displayName: 'Test Stage'
  dependsOn: Build
  jobs:
  - job: TestJob
    displayName: 'Test Job'
    steps:
    - script: |
        echo "${{ variables.greet }} - This is a test job"
        echo "${{ variables.greet }} - This is a test job"
  - job: SecondJob
    displayName: 'Second Test Job'
    steps:
    - script: |
        echo "Testing a second job"