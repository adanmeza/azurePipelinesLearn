parameters:
  - name: environment
    type: object
    default:
      - dev
      - qa
      - prod

variables:
- group: testVars

stages:
- stage: BuildStage
  jobs:
  - job: BuildJob
    steps:
    - script: echo "Starging build..."

- stage: usingSecVars
  jobs:
  - ${{ each zone in parameters.environment }}:
    - template: templates/doingStuffTemplate.yaml
      parameters:
        env: ${{ zone }}
        pwd: ${{ variables.password }}