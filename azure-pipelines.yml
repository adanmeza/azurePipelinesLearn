trigger:
- main

pool:
  name: Default

parameters:
- name: zones
  type: object
  default:
    - zone1
    - zone2
    - zone3

stages:
- stage: Build
  jobs:
  - job: MyJob
    strategy:
      matrix:
        dev:
          service: dev
          environment: test
        qa:
          service: qa
          environment: test
        prod:
          service: prod
          environment: prod
    steps:
    - script: |
        echo "This job has the following service: $(service)"
        echo "The environment is: $(environment)"
  - ${{ each zone in parameters.zones }}:
    - job: MyJob_${{ zone }}
      steps:
      - script: |
          echo "This job is using this zone: ${{ zone }}"