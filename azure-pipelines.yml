trigger:
- main

pool:
  name: Default

variables:
- name: color
  value: blue

stages:
- stage: myStage1
  displayName: 'My Stage'
  jobs:
  - job: myJob1
    displayName: 'My Job'
    steps:
    - script: |
        echo "My favorite color is $(color)"
    - script: |
        echo "##vso[task.setvariable variable=color;isOutput=true]orange"
      name: changeColor
- stage: myStage2
  displayName: 'My Stage 2'
  dependsOn: myStage1
  variables:
    color2: $[ stageDependencies.myStage1.myJob1.outptus['changeColor.color'] ]
  jobs:
  - job: myJob
    displayName: 'My job 2'
    steps:
    - script: |
        echo "I used to love ${{ variables.color }}"
    - script: |
        echo "But now my favorite color is $(color2)"