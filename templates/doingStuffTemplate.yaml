parameters:
- name: zones
  type: object
  default:
    - lab
    - env
    - prod
- name: messageZone
  default: ''

jobs:
- ${{ each zone in parameters.zones }}:
  - job: zoneName_${{ zone }}
    steps:
    - script: |
        echo "This is the zone: ${{ zone }}"
        echo "and the message is ${{ parameters.messageZone }}"